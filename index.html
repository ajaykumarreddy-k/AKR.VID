<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKR.VID</title>
  <!-- Keep styles.css for global resets, but override body background via the style block -->
  <link rel="stylesheet" href="styles.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    /* Reset default margins and set the background color */
    body,
    html {
      margin: 0;
      padding: 0;
      background-color: #1500FF !important;
      /* The exact blue color requested */
    }

    /* Container to add the blue space on the left and right sides */
    .layout-container {
      width: 100%;
      min-height: 100vh;
      padding: 0 4vw;
      /* Uses viewport width to keep the side margins responsive */
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      /* Stack elements vertically */
      align-items: center;
      /* Center horizontally */
    }

    /* The white shape */
    .white-card {
      background-color: #FFFFFF;
      width: 100%;
      height: 70vh;
      /* Increased height */
      border-bottom-left-radius: 40px;
      /* Rounded corners matching your image */
      border-bottom-right-radius: 40px;
      flex-shrink: 0;
      /* Prevents it from shrinking when text is added */
      overflow: hidden;
      /* Ensure video respects rounded corners */
      position: relative;
    }

    .hero-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Container for the bottom half */
    .bottom-section {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    /* The text in the bottom half */
    .bottom-text {
      width: 100%;
      display: flex;
      justify-content: flex-start;
      /* Aligned to the left */
      align-items: center;
      color: #000000;
      /* Black text */
      font-family: 'Google Sans', 'Product Sans', sans-serif;
      /* Requests Google Sans with fallbacks */
      font-size: clamp(6rem, 12vw, 12rem);
      /* Increased to be massive */
      font-weight: 900;
      /* Extra Bold text */
      text-align: left;
      letter-spacing: -0.05em;
      /* Tight letter spacing */
      margin: 20px 0;
      flex-shrink: 0;
    }

    .bottom-text img {
      height: 0.6em;
      width: auto;
      object-fit: contain;
    }

    .bottom-images {
      margin-left: auto;
      /* Pushes images to the far right */
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: nowrap;
      /* Ensures they stay on the same line */
    }

    /* --- 10000000% MATCH TILE STYLES --- */
    .tiles-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      width: 100%;
      padding-bottom: 40px;
      /* Padding at the end of the scroll area */
    }

    .custom-tile {
      background-color: #D4D4D4;
      /* Exact match to the light gray */
      padding: 12px;
      /* Tighter padding to match image */
      width: 100%;
      /* Take full width of grid cell */
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      border-radius: 4px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      /* Subtle definition edge */
      text-decoration: none;
      transition: transform 0.15s ease;
    }

    .custom-tile:hover {
      transform: scale(1.02);
    }

    .tile-black-area {
      background-color: #000000;
      width: 100%;
      aspect-ratio: 16 / 9;
      /* Replaces fixed height for proportional scaling */
      border-radius: 8px;
      /* Smooth rounded corners of the black box */
      margin-bottom: 4px;
      /* Pulled text closer to the image */
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tile-black-area img,
    .tile-black-area svg {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .tile-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      /* Locks the button exactly to the bottom */
      margin-top: 2px;
    }

    .tile-title {
      color: #000000;
      font-family: 'Helvetica Neue', 'Google Sans', sans-serif;
      /* Helvetica Neue added for that specific heavy look */
      font-size: 38px;
      font-weight: 900;
      /* Super heavy weight */
      letter-spacing: -0.09em;
      /* Extremely tight tracking replicating the image */
      margin: 0;
      line-height: 0.9;
    }

    .tile-btn {
      color: #000000;
      font-family: 'Helvetica Neue', 'Google Sans', sans-serif;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.06em;
      border: 4px solid #000000;
      /* Thicker black border matched to image */
      border-radius: 30px;
      /* True pill shape */
      padding: 2px 18px;
      /* Tighter vertical, wider horizontal padding */
      line-height: 1.1;
      background: transparent;
      cursor: pointer;
      margin-bottom: 0px;
      transition: background 0.2s, color 0.2s;
    }

    .custom-tile:hover .tile-btn {
      background: #000;
      color: #fff;
    }

    /* --- Footer Styles --- */
    .footer-container {
      width: 100%;
      border: 1px solid #333333;
      box-sizing: border-box;
      background-color: #111111;
      margin-top: 60px;
      margin-bottom: 40px;
      color: #d1d5db;
      font-family: 'Inter', sans-serif;
      align-self: center;
    }

    .footer-grid-layout {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: auto auto;
      border-bottom: none;
    }

    .footer-grid-item {
      border-right: 1px solid #333333;
      border-bottom: 1px solid #333333;
      padding: 2.5rem 2rem;
      box-sizing: border-box;
    }

    .footer-grid-item:last-child,
    .footer-grid-item.col-end {
      border-right: none;
    }

    .footer-grid-item.no-bottom-border {
      border-bottom: none;
    }

    .footer-link {
      display: block;
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
      color: #d1d5db;
      text-decoration: none;
      transition: color 0.2s;
      font-weight: 300;
    }

    .footer-link:last-child {
      margin-bottom: 0;
    }

    .footer-link:hover {
      color: #ffffff;
    }

    .footer-text {
      font-size: 0.9rem;
      line-height: 1.5;
      color: #d1d5db;
      font-weight: 300;
      margin-bottom: 0.5rem;
    }

    .footer-bottom-row {
      display: grid;
      grid-template-columns: 1fr 3fr;
    }

    .footer-left-panel {
      border-right: 1px solid #333333;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 300px;
      padding: 2rem;
      box-sizing: border-box;
      overflow: hidden;
    }

    .footer-right-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-color: #111111;
      position: relative;
    }

    .arrow-graphic {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      transform: rotate(180deg);
    }

    .arrow-line {
      stroke: #333333;
      stroke-width: 1;
      fill: none;
      vector-effect: non-scaling-stroke;
    }

    .copyright {
      font-size: 0.85rem;
      color: #a3a3a3;
      font-weight: 300;
      position: relative;
      z-index: 10;
    }

    .massive-logo {
      font-size: 15rem;
      font-weight: 600;
      color: #ffffff;
      line-height: 0.8;
      letter-spacing: -0.05em;
      width: 100%;
      text-align: left;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .registered-mark {
      font-size: 3rem;
      font-weight: 400;
      vertical-align: baseline;
      margin-left: 0.5rem;
    }

    @media (max-width: 1024px) {
      .footer-grid-layout {
        grid-template-columns: repeat(2, 1fr);
      }

      .footer-grid-item {
        border-right: 1px solid #333333;
      }

      .footer-grid-item:nth-child(2n) {
        border-right: none;
      }

      .massive-logo {
        font-size: 10vw;
      }
    }

    @media (max-width: 768px) {
      .footer-grid-layout {
        grid-template-columns: 1fr;
      }

      .footer-grid-item {
        border-right: none;
      }

      .footer-bottom-row {
        grid-template-columns: 1fr;
      }

      .footer-left-panel {
        border-right: none;
        border-bottom: 1px solid #333333;
        min-height: 200px;
      }

      .massive-logo {
        font-size: 15vw;
        justify-content: center;
        text-align: center;
      }
    }

    .flair-text-wrapper {
      width: 100%;
      position: relative;
    }

    .flair-svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* --- Mobile Layout Optimizations --- */
    @media (max-width: 1024px) {
      .tiles-grid { grid-template-columns: repeat(2, 1fr); }
    }
    
    @media (max-width: 768px) {
      .tiles-grid { grid-template-columns: 1fr; }
      .bottom-text {
        font-size: clamp(3rem, 10vw, 6rem);
        flex-direction: column;
        align-items: flex-start;
      }
      .bottom-images {
        margin-left: 0;
        margin-top: 15px;
        flex-wrap: wrap;
      }
      .white-card {
        height: 50vh;
      }
    }
  </style>
</head>

    const grid = document.getElementById('grid');

    TOOLS.forEach((t) => {
      const tile = document.createElement('a');

      tile.innerHTML = `
