<body>

<div class="tool-shell">
  <aside class="tool-sidebar">
    <div class="tool-logo">SUPER-G</div>
    <a class="tool-back" href="../index.html">&larr; All tools</a>

    <input type="file" id="fileInput" accept="image/*,video/*" hidden />
    <button class="btn primary" id="btnUpload">Upload Image / Video</button>
    <button class="btn" id="btnExportPng">Export PNG</button>
    <button class="btn hidden" id="btnExportWebm">Export WebM (5s)</button>
    <button class="btn" id="btnReroll">Re-roll Glitch</button>

    <div class="section-label">Parameters</div>
    <div id="ctrl-rgbShift"></div>
    <div id="ctrl-bands"></div>
    <div id="ctrl-sliceShift"></div>
    <div id="ctrl-corruption"></div>
    <div id="ctrl-animate"></div>
  </aside>

  <main class="tool-stage" id="stage">
    <canvas id="canvas"></canvas>
    <div class="drop-hint">Drop an image or video here, or click Upload</div>
  </main>
</div>

<script src="../js/engine.js"></script>
<script>
  function pseudoRandom(a, b) {
    const x = Math.sin(a * 12.9898 + b * 78.233) * 43758.5453;
    return x - Math.floor(x);
  }

  function render(ctx, src, w, h, p) {
    const srcCtx = src.getContext('2d');
    const imgData = srcCtx.getImageData(0, 0, w, h);
    const data = imgData.data;

    const tmp = document.createElement('canvas');
    tmp.width = w; tmp.height = h;
    const tctx = tmp.getContext('2d');

    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);

    // 1. true RGB channel split (chromatic aberration)
    ctx.globalCompositeOperation = 'lighter';
    const offsets = [[-p.rgbShift, 0], [0, 0], [p.rgbShift, 0]];
    for (let ch = 0; ch < 3; ch++) {
      const out = new Uint8ClampedArray(data.length);
      for (let i = 0; i < data.length; i += 4) { out[i + ch] = data[i + ch]; out[i + 3] = 255; }
      tctx.putImageData(new ImageData(out, w, h), 0, 0);
      ctx.drawImage(tmp, offsets[ch][0], offsets[ch][1]);
    }
    ctx.globalCompositeOperation = 'source-over';

    const seed = p.animate === 'On' ? performance.now() * 0.002 : p.seed;

    // 2. horizontal slice displacement
    for (let i = 0; i < p.bands; i++) {
      const ry = pseudoRandom(i, seed) * h;
      const bandH = 3 + pseudoRandom(i + 50, seed) * (h / 14);
      const dx = (pseudoRandom(i + 100, seed) - 0.5) * p.sliceShift;
      ctx.drawImage(src, 0, ry, w, bandH, dx, ry, w, bandH);
    }

    // 3. block corruption
    for (let i = 0; i < p.corruption; i++) {
      const bx = pseudoRandom(i + 200, seed) * w;
      const by = pseudoRandom(i + 300, seed) * h;
      const bw = 8 + pseudoRandom(i + 400, seed) * 50;
      const bh = 3 + pseudoRandom(i + 500, seed) * 14;
      const r = Math.floor(pseudoRandom(i + 1, seed) * 255);
      const g = Math.floor(pseudoRandom(i + 2, seed) * 255);
      const b = Math.floor(pseudoRandom(i + 3, seed) * 255);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(bx, by, bw, bh);
    }
  }

  const tool = new ArtKit.ArtKitTool({ canvasId: 'canvas', onRender: render, params: { seed: Math.random() * 1000 } });
  const stage = document.getElementById('stage');
  tool.bindUpload(document.getElementById('fileInput'), stage);

  const wrapLoad = tool.loadFile.bind(tool);
  tool.loadFile = (f) => { wrapLoad(f); stage.classList.add('has-source'); document.getElementById('btnExportWebm').classList.toggle('hidden', !f.type.startsWith('video/')); };

  document.getElementById('btnUpload').onclick = () => document.getElementById('fileInput').click();
  document.getElementById('btnExportPng').onclick = () => tool.exportPNG('superg.png');
  document.getElementById('btnExportWebm').onclick = () => tool.exportWebM('superg.webm', 5000);
  document.getElementById('btnReroll').onclick = () => { tool.params.seed = Math.random() * 1000; tool.refresh(); };

  ArtKit.mountSlider(document.getElementById('ctrl-rgbShift'), {
    key: 'rgbShift', label: 'RGB Shift', min: 0, max: 20, step: 1, value: 4,
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountSlider(document.getElementById('ctrl-bands'), {
    key: 'bands', label: 'Glitch Bands', min: 0, max: 25, step: 1, value: 8,
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountSlider(document.getElementById('ctrl-sliceShift'), {
    key: 'sliceShift', label: 'Slice Shift', min: 0, max: 80, step: 1, value: 24,
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountSlider(document.getElementById('ctrl-corruption'), {
    key: 'corruption', label: 'Block Corruption', min: 0, max: 20, step: 1, value: 4,
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountChoice(document.getElementById('ctrl-animate'), {
    key: 'animate', label: 'Animate', options: ['Off', 'On'], value: 'Off',
    params: tool.params,
    onChange: (v) => {
      if (tool.isVideo) return;
      if (v === 'On') tool.startLoop(); else { tool.stopLoop(); tool.refresh(); }
    },
  });
</script>
