<body>

<div class="tool-shell">
  <aside class="tool-sidebar">
    <div class="tool-logo">BLOCKS</div>
    <a class="tool-back" href="../index.html">&larr; All tools</a>

    <input type="file" id="fileInput" accept="image/*,video/*" hidden />
    <button class="btn primary" id="btnUpload">Upload Image / Video</button>
    <button class="btn" id="btnExportPng">Export PNG</button>
    <button class="btn hidden" id="btnExportWebm">Export WebM (5s)</button>

    <div class="section-label">Block size</div>
    <div id="ctrl-cell"></div>

    <div class="section-label">Studs</div>
    <div id="ctrl-studs"></div>
  </aside>

  <main class="tool-stage" id="stage">
    <canvas id="canvas"></canvas>
    <div class="drop-hint">Drop an image or video here, or click Upload</div>
  </main>
</div>

<script src="../js/engine.js"></script>
<script>
  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawBlock(ctx, x, y, size, r, g, b, studs) {
    const pad = size * 0.06;
    const bx = x + pad, by = y + pad, bs = size - pad * 2;

    ctx.fillStyle = `rgb(${r},${g},${b})`;
    roundRect(ctx, bx, by, bs, bs, bs * 0.15);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    ctx.fillRect(bx, by, bs, bs * 0.16);
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.fillRect(bx, by + bs * 0.74, bs, bs * 0.26);

    if (studs) {
      const studR = bs * 0.22;
      ctx.beginPath();
      ctx.arc(bx + bs / 2, by + bs / 2, studR, 0, Math.PI * 2);
      ctx.fillStyle = `rgb(${Math.min(255, r + 25)},${Math.min(255, g + 25)},${Math.min(255, b + 25)})`;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bx + bs / 2 - studR * 0.25, by + bs / 2 - studR * 0.25, studR * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fill();
    }
  }

  function render(ctx, src, w, h, p) {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, w, h);

    const cell = p.cell;
    const data = src.getContext('2d').getImageData(0, 0, w, h).data;

    for (let y = 0; y < h; y += cell) {
      for (let x = 0; x < w; x += cell) {
        const cx = Math.min(w - 1, x + Math.floor(cell / 2));
        const cy = Math.min(h - 1, y + Math.floor(cell / 2));
        const idx = (cy * w + cx) * 4;
        drawBlock(ctx, x, y, cell, data[idx], data[idx + 1], data[idx + 2], p.studs === 'On');
      }
    }
  }

  const tool = new ArtKit.ArtKitTool({ canvasId: 'canvas', onRender: render, params: {} });
  const stage = document.getElementById('stage');
  tool.bindUpload(document.getElementById('fileInput'), stage);

  const wrapLoad = tool.loadFile.bind(tool);
  tool.loadFile = (f) => { wrapLoad(f); stage.classList.add('has-source'); document.getElementById('btnExportWebm').classList.toggle('hidden', !f.type.startsWith('video/')); };

  document.getElementById('btnUpload').onclick = () => document.getElementById('fileInput').click();
  document.getElementById('btnExportPng').onclick = () => tool.exportPNG('blocks.png');
  document.getElementById('btnExportWebm').onclick = () => tool.exportWebM('blocks.webm', 5000);

  ArtKit.mountSlider(document.getElementById('ctrl-cell'), {
    key: 'cell', label: 'Block Size (px)', min: 6, max: 50, step: 1, value: 18,
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountChoice(document.getElementById('ctrl-studs'), {
    key: 'studs', label: '', options: ['Off', 'On'], value: 'On',
    params: tool.params, onChange: () => tool.refresh(),
  });
</script>
