<body>

<div class="tool-shell">
  <aside class="tool-sidebar">
    <h1 class="tool-logo">RECOLOR</h1>
    <a class="tool-back" href="../index.html">&larr; All tools</a>

    <input type="file" id="fileInput" accept="image/*,video/*" hidden />
    <button class="btn primary" id="btnUpload">Upload Image / Video</button>
    <button class="btn" id="btnExportPng">Export PNG</button>
    <button class="btn hidden" id="btnExportWebm">Export WebM (5s)</button>

    <div class="section-label">Mode</div>
    <div id="ctrl-mode"></div>

    <div class="section-label" id="hueGroupLabel">Hue rotate</div>
    <div id="ctrl-hue"></div>
    <div id="ctrl-saturation"></div>
    <div id="ctrl-animate"></div>

    <div class="section-label" id="duoGroupLabel">Duotone colors</div>
    <div id="ctrl-colorA"></div>
    <div id="ctrl-colorB"></div>
  </aside>

  <main class="tool-stage" id="stage">
    <canvas id="canvas"></canvas>
    <div class="drop-hint">Drop an image or video here, or click Upload</div>
  </main>
</div>

<script src="../js/engine.js"></script>
<script>
  function hexToRgb(hex) {
    return {
      r: parseInt(hex.slice(1, 3), 16),
      g: parseInt(hex.slice(3, 5), 16),
      b: parseInt(hex.slice(5, 7), 16),
    };
  }

  function render(ctx, src, w, h, p) {
    if (p.mode === 'Hue Rotate') {
      const deg = p.animate === 'On' ? (performance.now() / 20) % 360 : p.hue;
      ctx.filter = `hue-rotate(${deg}deg) saturate(${p.saturation}%)`;
      ctx.drawImage(src, 0, 0, w, h);
      ctx.filter = 'none';
    } else { // Duotone
      const imgData = src.getContext('2d').getImageData(0, 0, w, h);
      const d = imgData.data;
      const c1 = hexToRgb(p.colorA), c2 = hexToRgb(p.colorB);
      for (let i = 0; i < d.length; i += 4) {
        const lum = (d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114) / 255;
        d[i] = c1.r + (c2.r - c1.r) * lum;
        d[i + 1] = c1.g + (c2.g - c1.g) * lum;
        d[i + 2] = c1.b + (c2.b - c1.b) * lum;
      }
      ctx.putImageData(imgData, 0, 0);
    }
  }

  const tool = new ArtKit.ArtKitTool({ canvasId: 'canvas', onRender: render, params: {} });
  const stage = document.getElementById('stage');
  tool.bindUpload(document.getElementById('fileInput'), stage);

  const wrapLoad = tool.loadFile.bind(tool);
  tool.loadFile = (f) => { wrapLoad(f); stage.classList.add('has-source'); document.getElementById('btnExportWebm').classList.toggle('hidden', !f.type.startsWith('video/')); };

  document.getElementById('btnUpload').onclick = () => document.getElementById('fileInput').click();
  document.getElementById('btnExportPng').onclick = () => tool.exportPNG('recolor.png');
  document.getElementById('btnExportWebm').onclick = () => tool.exportWebM('recolor.webm', 5000);

  ArtKit.mountChoice(document.getElementById('ctrl-mode'), {
    key: 'mode', label: '', options: ['Hue Rotate', 'Duotone'], value: 'Hue Rotate',
    params: tool.params,
    onChange: () => { tool.refresh(); },
  });
  ArtKit.mountSlider(document.getElementById('ctrl-hue'), {
    key: 'hue', label: 'Hue', min: 0, max: 360, step: 1, value: 0,
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountSlider(document.getElementById('ctrl-saturation'), {
    key: 'saturation', label: 'Saturation %', min: 0, max: 200, step: 1, value: 100,
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountChoice(document.getElementById('ctrl-animate'), {
    key: 'animate', label: 'Animate hue', options: ['Off', 'On'], value: 'Off',
    params: tool.params,
    onChange: (v) => {
      if (tool.isVideo) return;
      if (v === 'On') tool.startLoop(); else { tool.stopLoop(); tool.refresh(); }
    },
  });
  ArtKit.mountColorSwatches(document.getElementById('ctrl-colorA'), {
    key: 'colorA', label: 'Shadows', colors: ['#0b0033', '#000000', '#1c1208', '#001f1f', '#330011'],
    value: '#0b0033', params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountColorSwatches(document.getElementById('ctrl-colorB'), {
    key: 'colorB', label: 'Highlights', colors: ['#ff9d3d', '#ffffff', '#ffea00', '#39ff14', '#ff3df0'],
    value: '#ff9d3d', params: tool.params, onChange: () => tool.refresh(),
  });
</script>
