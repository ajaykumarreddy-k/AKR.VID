<body>

<!--
  TEMPLATE — copy this file to tools/<yourtool>.html and:
  1. Replace TOOLNAME everywhere (title + .tool-logo).
  2. Add one <div id="ctrl-..."></div> row per parameter in the sidebar.
  3. Write your render(ctx, src, w, h, p) function — it receives the
     CURRENT RAW FRAME as `src` (an offscreen <canvas> already sized to
     match the source), and must paint the effect onto `ctx`.
  4. Wire each control with ArtKit.mountSlider / mountChoice / mountColorSwatches.
  5. Add a card for this tool to the TOOLS array in /index.html.
-->

<div class="tool-shell">
  <aside class="tool-sidebar">
    <div class="tool-logo">TOOLNAME</div>
    <a class="tool-back" href="../index.html">&larr; All tools</a>

    <input type="file" id="fileInput" accept="image/*,video/*" hidden />
    <button class="btn primary" id="btnUpload">Upload Image / Video</button>
    <button class="btn" id="btnCamera">Open Camera</button>
    <button class="btn" id="btnExportPng">Export PNG</button>
    <button class="btn hidden" id="btnExportWebm">Export WebM (5s)</button>

    <div class="section-label">Parameters</div>
    <!-- TODO: add <div id="ctrl-yourParam"></div> rows here -->
  </aside>

  <main class="tool-stage" id="stage">
    <canvas id="canvas"></canvas>
    <div class="drop-hint">Drop an image or video here, or click Upload</div>
  </main>
</div>

<script src="../js/engine.js"></script>
<script>
  // TODO: implement the effect. `p` holds every value wired up below.
  function render(ctx, src, w, h, p) {
    ctx.drawImage(src, 0, 0, w, h); // placeholder: pass-through
  }

  const tool = new ArtKit.ArtKitTool({ canvasId: 'canvas', onRender: render, params: {} });
  const stage = document.getElementById('stage');
  tool.bindUpload(document.getElementById('fileInput'), stage);

  const wrapLoad = tool.loadFile.bind(tool);
  tool.loadFile = (f) => { wrapLoad(f); stage.classList.add('has-source'); document.getElementById('btnExportWebm').classList.toggle('hidden', !f.type.startsWith('video/')); };

  document.getElementById('btnUpload').onclick = () => document.getElementById('fileInput').click();
  document.getElementById('btnCamera').onclick = () => tool.openCamera().then(() => stage.classList.add('has-source'));
  document.getElementById('btnExportPng').onclick = () => tool.exportPNG('toolname.png');
  document.getElementById('btnExportWebm').onclick = () => tool.exportWebM('toolname.webm', 5000);

  // TODO: mount controls, e.g.
  // ArtKit.mountSlider(document.getElementById('ctrl-yourParam'), {
  //   key: 'yourParam', label: 'Your Param', min: 0, max: 100, step: 1, value: 50,
  //   params: tool.params, onChange: () => tool.refresh(),
  // });
</script>
