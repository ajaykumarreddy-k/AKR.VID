    "applicationCategory": "MultimediaApplication",

<body>

<div class="tool-shell">
  <aside class="tool-sidebar">
    <h1 class="tool-logo">TRIGGERWAVE</h1>
    <a class="tool-back" href="../index.html">&larr; All tools</a>

    <input type="file" id="audioInput" accept="audio/*" hidden />
    <button class="btn primary" id="btnUpload">Upload Audio</button>
    <button class="btn" id="btnExportPng">Export PNG</button>
    <button class="btn hidden" id="btnExportWebm">Export WebM + Audio (10s)</button>

    <div class="section-label">Energy Meter</div>
    <div id="meterWrap">
      <div class="ctrl-head"><span>Live energy</span><span class="ctrl-val" id="meterVal">0.00</span></div>
      <div style="height:10px;background:#1d1d1d;border-radius:6px;overflow:hidden;">
        <div id="meterBar" style="height:100%;width:0%;background:var(--accent);"></div>
      </div>
      <div class="ctrl-head" style="margin-top:6px;"><span>Beat</span><span class="ctrl-val" id="beatIndicator">—</span></div>
    </div>

    <div class="section-label">Visual Preset</div>
    <div id="ctrl-preset"></div>
    <div id="ctrl-sensitivity"></div>
    <div id="ctrl-colorScheme"></div>
  </aside>

  <main class="tool-stage" id="stage">
    <canvas id="canvas" width="800" height="450"></canvas>
    <div class="drop-hint">Upload an audio file to see beat-synced visuals</div>
  </main>
</div>

<script src="../js/engine.js"></script>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');
  const hint = document.getElementById('hint');
  const meterVal = document.getElementById('meterVal');
  const meterBar = document.getElementById('meterBar');
  const beatIndicator = document.getElementById('beatIndicator');

  const params = {
    preset: 'Pulse',
    sensitivity: 1.4,
    colorScheme: 'Neon',
  };

  const COLOR_MAPS = {
    'Neon': ['#39d97a', '#22d3ee', '#f97316', '#ef4444'],
    'Fire': ['#ff4500', '#ff8c00', '#ffd700', '#fff4e0'],
    'Ocean': ['#004de6', '#0099ff', '#66ccff', '#e0f4ff'],
    'Monochrome': ['#ffffff', '#bbbbbb', '#888888', '#333333'],
  };

  let audioCtx = null;
  let analyser = null;
  let audioEl = null;
  let recordingDest = null;
  let _raf = null;
  let hasAudio = false;

  // Beat detection state
  let energyHistory = [];
  let lastBeatTime = 0;
  let beatFlash = 0;

  function isBeat(energy, rollingAvg, lastBeatTime, now, sensitivity) {
    return energy > rollingAvg * sensitivity && now - lastBeatTime > 150;
  }

  function renderFrame(timestamp) {
    if (!analyser) return;

    const freqData = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(freqData);

    const total = freqData.reduce((a, b) => a + b, 0);
    const energy = total / freqData.length / 255;

    // Rolling average (last 30 frames)
    energyHistory.push(energy);
    if (energyHistory.length > 30) energyHistory.shift();
    const rollingAvg = energyHistory.reduce((a, b) => a + b, 0) / energyHistory.length;

    // Beat detection
    const now = performance.now();
    const beat = isBeat(energy, rollingAvg, lastBeatTime, now, params.sensitivity);
    if (beat) {
      lastBeatTime = now;
      beatFlash = 1;
    }

    // UI updates
    meterVal.textContent = energy.toFixed(2);
    meterBar.style.width = `${Math.min(100, energy * 140)}%`;
    beatIndicator.textContent = beat ? '⚡ BEAT' : '—';
    beatIndicator.style.color = beat ? '#39d97a' : '#666';

    beatFlash *= 0.92;

    const colors = COLOR_MAPS[params.colorScheme] || COLOR_MAPS['Neon'];
    const w = canvas.width, h = canvas.height;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);

    switch (params.preset) {
      case 'Pulse': {
        const baseR = 40 + energy * 160;
        const pulseR = beatFlash > 0.1 ? baseR * (1 + beatFlash * 0.3) : baseR;
        const grad = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, pulseR);
        grad.addColorStop(0, colors[0]);
        grad.addColorStop(0.5, colors[1]);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(w / 2, h / 2, pulseR, 0, Math.PI * 2);
        ctx.fill();

        // Beat flash ring
        if (beatFlash > 0.1) {
          ctx.strokeStyle = `rgba(255,255,255,${beatFlash * 0.5})`;
          ctx.lineWidth = 2 + beatFlash * 4;
          ctx.beginPath();
          ctx.arc(w / 2, h / 2, pulseR * 1.1, 0, Math.PI * 2);
          ctx.stroke();
        }
        break;
      }
      case 'Bars': {
        const barCount = 64;
        const barW = w / barCount;
        for (let i = 0; i < barCount; i++) {
          const idx = Math.floor(i * freqData.length / barCount);
          const val = freqData[idx] / 255;
          const barH = val * h * 0.8;
          const ci = Math.floor(val * (colors.length - 1));
          ctx.fillStyle = colors[Math.min(ci, colors.length - 1)];
          ctx.fillRect(i * barW, h - barH, barW - 1, barH);
        }

        // Beat flash overlay
        if (beatFlash > 0.1) {
          ctx.fillStyle = `rgba(255,255,255,${beatFlash * 0.12})`;
          ctx.fillRect(0, 0, w, h);
        }
        break;
      }
      case 'Wave': {
        ctx.strokeStyle = colors[0];
        ctx.lineWidth = 2;
        ctx.beginPath();
        const step = Math.max(1, Math.floor(freqData.length / 160));
        for (let i = 0; i < freqData.length; i += step) {
          const x = (i / freqData.length) * w;
          const y = h / 2 + (freqData[i] / 255 - 0.5) * h * 0.8;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();

        // Beat flash: mirrored wave
        if (beatFlash > 0.1) {
          ctx.strokeStyle = `rgba(255,255,255,${beatFlash * 0.4})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          for (let i = 0; i < freqData.length; i += step) {
            const x = (i / freqData.length) * w;
            const y = h / 2 - (freqData[i] / 255 - 0.5) * h * 0.8;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.stroke();
        }

        // Beat ring
        if (beatFlash > 0.1) {
          ctx.strokeStyle = `rgba(255,255,255,${beatFlash * 0.3})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(w / 2, h / 2, 20 + beatFlash * 60, 0, Math.PI * 2);
          ctx.stroke();
        }
        break;
      }
    }

    _raf = requestAnimationFrame(renderFrame);
  }

  function buildExportStream(canvas, audioDestNode) {
    const videoStream = canvas.captureStream(30);
    const audioTrack = audioDestNode.stream.getAudioTracks()[0];
    if (!audioTrack) return videoStream;
    return new MediaStream([...videoStream.getVideoTracks(), audioTrack]);
  }

  async function loadAudio(file) {
    if (audioCtx) {
      audioCtx.close();
      if (_raf) cancelAnimationFrame(_raf);
    }

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    recordingDest = audioCtx.createMediaStreamDestination();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;

    audioEl = new Audio(URL.createObjectURL(file));
    audioEl.loop = true;
    const source = audioCtx.createMediaElementSource(audioEl);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.connect(recordingDest);

    energyHistory = [];
    lastBeatTime = 0;
    beatFlash = 0;
    hasAudio = true;

    await audioEl.play();
    stage.classList.add('has-source');
    document.getElementById('btnExportWebm').classList.remove('hidden');
    hint.classList.add('hidden');

    if (_raf) cancelAnimationFrame(_raf);
    renderFrame();
  }

  // Export with audio
  function exportWebMMuxed(filename, durationMs) {
    if (!canvas.captureStream || !recordingDest) {
      alert('Audio/video export needs a recent Chrome/Edge/Firefox build.');
      return;
    }

    const stream = buildExportStream(canvas, recordingDest);
    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    const chunks = [];
    recorder.ondataavailable = (e) => e.data.size && chunks.push(e.data);
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: 'video/webm' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename || 'triggerwave-export.webm';
      a.click();
    };
    recorder.start();
    setTimeout(() => recorder.stop(), durationMs || 10000);
  }

  function exportPNG(filename) {
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = filename || 'triggerwave-export.png';
    a.click();
  }

  // Wire UI
  document.getElementById('btnUpload').onclick = () => document.getElementById('audioInput').click();
  document.getElementById('audioInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) loadAudio(file);
  });

  document.getElementById('btnExportPng').onclick = () => exportPNG('triggerwave.png');
  document.getElementById('btnExportWebm').onclick = () => exportWebMMuxed('triggerwave.webm', 10000);

  ArtKit.mountChoice(document.getElementById('ctrl-preset'), {
    key: 'preset', label: '', options: ['Pulse', 'Bars', 'Wave'], value: 'Pulse',
    params,
  });
  ArtKit.mountSlider(document.getElementById('ctrl-sensitivity'), {
    key: 'sensitivity', label: 'Beat Sensitivity', min: 1.0, max: 3.0, step: 0.05, value: 1.4,
    params,
  });
  ArtKit.mountChoice(document.getElementById('ctrl-colorScheme'), {
    key: 'colorScheme', label: '', options: Object.keys(COLOR_MAPS), value: 'Neon',
    params,
  });
</script>
