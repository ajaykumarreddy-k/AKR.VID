  <meta property="og:description" content="Use the Scanline Pro tool on AKR.VID to apply brutalist web-based image and video effects." />

<body>

<div class="tool-shell">
  <aside class="tool-sidebar">
    <h1 class="tool-logo">SCANLINE PRO</h1>
    <a class="tool-back" href="../index.html">&larr; All tools</a>

    <input type="file" id="fileInput" accept="image/*,video/*" hidden />
    <button class="btn primary" id="btnUpload">Upload Image / Video</button>
    <button class="btn" id="btnCamera">Open Camera</button>
    <button class="btn" id="btnExportPng">Export PNG</button>
    <button class="btn hidden" id="btnExportWebm">Export WebM (5s)</button>

    <div class="section-label">Preset</div>
    <div id="ctrl-preset"></div>

    <div class="section-label">Analog</div>
    <div id="ctrl-intensity"></div>
    <div id="ctrl-chroma"></div>
    <div id="ctrl-trackingSpeed"></div>

    <div class="section-label">Digital</div>
    <div id="ctrl-blockCoverage"></div>
    <div id="ctrl-blockSpeed"></div>

    <div class="section-label">CRT</div>
    <div id="ctrl-curvature"></div>
    
    <div class="section-label">Animation</div>
    <div id="ctrl-animate"></div>
  </aside>

  <main class="tool-stage" id="stage">
    <canvas id="canvas"></canvas>
    <div class="drop-hint">Drop an image or video here, or click Upload</div>
  </main>
</div>

<script src="../js/engine.js"></script>
<script>
  function pseudoRandom(a, b) {
    const x = Math.sin(a * 12.9898 + b * 78.233) * 43758.5453;
    return x - Math.floor(x);
  }

  function applyPresets(preset, params) {
    if (preset === 'Full') {
      params.intensity = 50; params.chroma = 8; params.trackingSpeed = 20;
      params.blockCoverage = 5; params.blockSpeed = 10; params.curvature = 30;
    } else if (preset === 'Analog') {
      params.intensity = 80; params.chroma = 15; params.trackingSpeed = 40;
      params.blockCoverage = 0; params.blockSpeed = 0; params.curvature = 10;
    } else if (preset === 'Digital') {
      params.intensity = 10; params.chroma = 5; params.trackingSpeed = 0;
      params.blockCoverage = 15; params.blockSpeed = 25; params.curvature = 0;
    } else if (preset === 'Subtle') {
      params.intensity = 15; params.chroma = 2; params.trackingSpeed = 5;
      params.blockCoverage = 0; params.blockSpeed = 0; params.curvature = 5;
    }
  }

  function render(ctx, src, w, h, p) {
    const seed = p.animate === 'On' || tool.isVideo ? performance.now() * 0.05 : 1000;
    
    const tmp = document.createElement('canvas');
    tmp.width = w; tmp.height = h;
    const tctx = tmp.getContext('2d');
    tctx.drawImage(src, 0, 0, w, h);

    if (p.blockCoverage > 0) {
      const blockSeed = Math.floor(seed * (p.blockSpeed / 100) * 0.1);
      const numBlocks = Math.floor((p.blockCoverage / 100) * 30);
      for (let i = 0; i < numBlocks; i++) {
        const bx = pseudoRandom(i + 200, blockSeed) * w;
        const by = pseudoRandom(i + 300, blockSeed) * h;
        const bw = 8 + pseudoRandom(i + 400, blockSeed) * 50;
        const bh = 3 + pseudoRandom(i + 500, blockSeed) * 14;
        const shiftX = (pseudoRandom(i + 600, blockSeed) - 0.5) * 50;
        tctx.drawImage(tmp, bx, by, bw, bh, bx + shiftX, by, bw, bh);
      }
    }

    if (p.trackingSpeed > 0) {
      const trackSeed = Math.floor(seed * (p.trackingSpeed / 100) * 0.5);
      const bandY = pseudoRandom(1, trackSeed) * h;
      const bandH = 6 + pseudoRandom(2, trackSeed) * 30;
      const dx = (pseudoRandom(3, trackSeed) - 0.5) * (p.trackingSpeed * 2);
      tctx.drawImage(tmp, 0, bandY, w, bandH, dx, bandY, w, bandH);
    }

    const srcData = tctx.getImageData(0, 0, w, h).data;
    const outImg = ctx.createImageData(w, h);
    const outData = outImg.data;
    
    const cx = w / 2;
    const cy = h / 2;
    const k = (p.curvature / 100) * 0.25; 
    const chromaOffset = p.chroma; 
    const intensity = p.intensity / 100;

    for (let y = 0; y < h; y++) {
      const ny = (y - cy) / cy; 
      const ny2 = ny * ny;
      const scanDarken = (y % 2 === 0) ? 1 : (1 - intensity * 0.5);
      
      for (let x = 0; x < w; x++) {
        const nx = (x - cx) / cx;
        const nx2 = nx * nx;
        
        const r2 = nx2 + ny2;
        const f = 1 + k * r2 * r2; 
        
        const srcNx = nx * f;
        const srcNy = ny * f;
        
        const sx = srcNx * cx + cx;
        const sy = srcNy * cy + cy;
        
        const di = (y * w + x) * 4;
        
        if (sx >= 0 && sx < w && sy >= 0 && sy < h) {
           const rX = Math.min(w - 1, Math.max(0, sx - chromaOffset * f));
           const gX = sx;
           const bX = Math.min(w - 1, Math.max(0, sx + chromaOffset * f));
           
           const sY = Math.floor(sy);
           
           const rI = (sY * w + Math.floor(rX)) * 4;
           const gI = (sY * w + Math.floor(gX)) * 4;
           const bI = (sY * w + Math.floor(bX)) * 4;
           
           const n = (pseudoRandom(di, seed) - 0.5) * (intensity * 150);
           
           outData[di] = srcData[rI] * scanDarken + n;
           outData[di + 1] = srcData[gI + 1] * scanDarken + n;
           outData[di + 2] = srcData[bI + 2] * scanDarken + n;
           outData[di + 3] = 255;
        } else {
           outData[di + 3] = 255;
        }
      }
    }
    
    ctx.putImageData(outImg, 0, 0);

    if (intensity > 0) {
      const grad = ctx.createRadialGradient(cx, cy, h * 0.4, cx, cy, h * Math.max(0.6, 1.1 - intensity));
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(1, `rgba(0,0,0,${intensity * 0.8})`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
    }
  }

  const tool = new ArtKit.ArtKitTool({ canvasId: 'canvas', onRender: render, params: {} });
  const stage = document.getElementById('stage');
  tool.bindUpload(document.getElementById('fileInput'), stage);

  const wrapLoad = tool.loadFile.bind(tool);
  tool.loadFile = (f) => { wrapLoad(f); stage.classList.add('has-source'); document.getElementById('btnExportWebm').classList.toggle('hidden', !f.type.startsWith('video/')); };

  document.getElementById('btnUpload').onclick = () => document.getElementById('fileInput').click();
  document.getElementById('btnCamera').onclick = () => tool.openCamera().then(() => stage.classList.add('has-source'));
  document.getElementById('btnExportPng').onclick = () => tool.exportPNG('scanlinepro.png');
  document.getElementById('btnExportWebm').onclick = () => tool.exportWebM('scanlinepro.webm', 5000);

  function mountAll() {
    document.getElementById('ctrl-preset').innerHTML = '';
    document.getElementById('ctrl-intensity').innerHTML = '';
    document.getElementById('ctrl-chroma').innerHTML = '';
    document.getElementById('ctrl-trackingSpeed').innerHTML = '';
    document.getElementById('ctrl-blockCoverage').innerHTML = '';
    document.getElementById('ctrl-blockSpeed').innerHTML = '';
    document.getElementById('ctrl-curvature').innerHTML = '';
    document.getElementById('ctrl-animate').innerHTML = '';

    ArtKit.mountChoice(document.getElementById('ctrl-preset'), {
      key: 'preset', label: '', options: ['Custom', 'Full', 'Analog', 'Digital', 'Subtle'], value: tool.params.preset || 'Full',
      params: tool.params, onChange: (v) => { applyPresets(v, tool.params); mountAll(); tool.refresh(); },
    });
    ArtKit.mountSlider(document.getElementById('ctrl-intensity'), {
      key: 'intensity', label: 'Intensity', min: 0, max: 100, step: 1, value: tool.params.intensity ?? 50,
      params: tool.params, onChange: () => { tool.params.preset = 'Custom'; tool.refresh(); },
    });
    ArtKit.mountSlider(document.getElementById('ctrl-chroma'), {
      key: 'chroma', label: 'Chroma', min: 0, max: 20, step: 1, value: tool.params.chroma ?? 8,
      params: tool.params, onChange: () => { tool.params.preset = 'Custom'; tool.refresh(); },
    });
    ArtKit.mountSlider(document.getElementById('ctrl-trackingSpeed'), {
      key: 'trackingSpeed', label: 'Tracking Speed', min: 0, max: 100, step: 1, value: tool.params.trackingSpeed ?? 20,
      params: tool.params, onChange: () => { tool.params.preset = 'Custom'; tool.refresh(); },
    });
    ArtKit.mountSlider(document.getElementById('ctrl-blockCoverage'), {
      key: 'blockCoverage', label: 'Block Coverage', min: 0, max: 100, step: 1, value: tool.params.blockCoverage ?? 5,
      params: tool.params, onChange: () => { tool.params.preset = 'Custom'; tool.refresh(); },
    });
    ArtKit.mountSlider(document.getElementById('ctrl-blockSpeed'), {
      key: 'blockSpeed', label: 'Block Speed', min: 0, max: 100, step: 1, value: tool.params.blockSpeed ?? 10,
      params: tool.params, onChange: () => { tool.params.preset = 'Custom'; tool.refresh(); },
    });
    ArtKit.mountSlider(document.getElementById('ctrl-curvature'), {
      key: 'curvature', label: 'Curvature', min: 0, max: 100, step: 1, value: tool.params.curvature ?? 30,
      params: tool.params, onChange: () => { tool.params.preset = 'Custom'; tool.refresh(); },
    });
    ArtKit.mountChoice(document.getElementById('ctrl-animate'), {
      key: 'animate', label: 'Animate (stills)', options: ['Off', 'On'], value: tool.params.animate || 'Off',
      params: tool.params,
      onChange: (v) => {
        if (tool.isVideo) return;
        if (v === 'On') tool.startLoop(); else { tool.stopLoop(); tool.refresh(); }
      },
    });
  }
  
  applyPresets('Full', tool.params);
  tool.params.preset = 'Full';
  mountAll();

</script>
