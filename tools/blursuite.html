  <meta property="og:description" content="Use the BlurSuite tool on AKR.VID to apply brutalist web-based image and video effects." />

    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "BlurSuite",

    "operatingSystem": "Web",

  }
  </script>

<body>

<div class="tool-shell">
  <aside class="tool-sidebar">
    <h1 class="tool-logo">BLURSUITE</h1>
    <a class="tool-back" href="../index.html">&larr; All tools</a>

    <input type="file" id="fileInput" accept="image/*,video/*" hidden />
    <button class="btn primary" id="btnUpload">Upload Image / Video</button>
    <button class="btn" id="btnExportPng">Export PNG</button>
    <button class="btn hidden" id="btnExportWebm">Export WebM (5s)</button>

    <div class="section-label">Blur mode</div>
    <div id="ctrl-mode"></div>

    <div class="section-label">Parameters</div>
    <div id="ctrl-strength"></div>
    <div id="ctrl-steps"></div>
    <div id="ctrl-angle"></div>
    <div id="ctrl-wavePeriod"></div>
    <div id="ctrl-animate"></div>
  </aside>

  <main class="tool-stage" id="stage">
    <canvas id="canvas"></canvas>
    <div class="drop-hint">Drop an image or video here, or click Upload</div>
  </main>
</div>

<script src="../js/engine.js"></script>
<script>
  function render(ctx, src, w, h, p) {
    ctx.clearRect(0, 0, w, h);
    const steps = Math.max(2, p.steps);

    if (p.mode === 'Linear') {
      const angle = (p.angle * Math.PI) / 180;
      const dx = Math.cos(angle), dy = Math.sin(angle);
      ctx.globalAlpha = 1 / steps;
      for (let i = 0; i < steps; i++) {
        const t = (i / (steps - 1) - 0.5) * p.strength;
        ctx.drawImage(src, dx * t, dy * t);
      }
    } else if (p.mode === 'Zoom') {
      ctx.globalAlpha = 1 / steps;
      for (let i = 0; i < steps; i++) {
        const s = 1 + (i / (steps - 1)) * (p.strength / 100);
        ctx.save();
        ctx.translate(w / 2, h / 2); ctx.scale(s, s); ctx.translate(-w / 2, -h / 2);
        ctx.drawImage(src, 0, 0);
        ctx.restore();
      }
    } else if (p.mode === 'Radial') {
      ctx.globalAlpha = 1 / steps;
      for (let i = 0; i < steps; i++) {
        const a = (i / (steps - 1) - 0.5) * ((p.strength * Math.PI) / 180);
        ctx.save();
        ctx.translate(w / 2, h / 2); ctx.rotate(a); ctx.translate(-w / 2, -h / 2);
        ctx.drawImage(src, 0, 0);
        ctx.restore();
      }
    } else if (p.mode === 'TB' || p.mode === 'LR') {
      ctx.globalAlpha = 1;
      const blurCanv = document.createElement('canvas');
      blurCanv.width = w; blurCanv.height = h;
      const bctx = blurCanv.getContext('2d');
      bctx.filter = `blur(${p.strength * 0.4}px)`;
      bctx.drawImage(src, 0, 0);
      
      ctx.drawImage(src, 0, 0);
      
      const maskCanv = document.createElement('canvas');
      maskCanv.width = w; maskCanv.height = h;
      const mctx = maskCanv.getContext('2d');
      
      const grad = p.mode === 'TB' ? mctx.createLinearGradient(0, 0, 0, h) : mctx.createLinearGradient(0, 0, w, 0);
      grad.addColorStop(0, 'rgba(0,0,0,1)');
      grad.addColorStop(0.35, 'rgba(0,0,0,0)');
      grad.addColorStop(0.65, 'rgba(0,0,0,0)');
      grad.addColorStop(1, 'rgba(0,0,0,1)');
      
      mctx.fillStyle = grad;
      mctx.fillRect(0, 0, w, h);
      mctx.globalCompositeOperation = 'source-in';
      mctx.drawImage(blurCanv, 0, 0);
      
      ctx.drawImage(maskCanv, 0, 0);
    } else { // Wave
      ctx.globalAlpha = 1;
      const data = src.getContext('2d').getImageData(0, 0, w, h);
      const out = ctx.createImageData(w, h);
      const t = performance.now() / 500;
      for (let y = 0; y < h; y++) {
        const offset = Math.sin(y / p.wavePeriod + t) * p.strength;
        for (let x = 0; x < w; x++) {
          let sx = Math.round(x + offset);
          sx = Math.max(0, Math.min(w - 1, sx));
          const si = (y * w + sx) * 4, di = (y * w + x) * 4;
          out.data[di] = data.data[si];
          out.data[di + 1] = data.data[si + 1];
          out.data[di + 2] = data.data[si + 2];
          out.data[di + 3] = 255;
        }
      }
      ctx.putImageData(out, 0, 0);
    }
    ctx.globalAlpha = 1;
  }

  const tool = new ArtKit.ArtKitTool({ canvasId: 'canvas', onRender: render, params: {} });
  const stage = document.getElementById('stage');
  tool.bindUpload(document.getElementById('fileInput'), stage);

  const wrapLoad = tool.loadFile.bind(tool);
  tool.loadFile = (f) => { wrapLoad(f); stage.classList.add('has-source'); document.getElementById('btnExportWebm').classList.toggle('hidden', !f.type.startsWith('video/')); };

  document.getElementById('btnUpload').onclick = () => document.getElementById('fileInput').click();
  document.getElementById('btnExportPng').onclick = () => tool.exportPNG('blursuite.png');
  document.getElementById('btnExportWebm').onclick = () => tool.exportWebM('blursuite.webm', 5000);

  ArtKit.mountChoice(document.getElementById('ctrl-mode'), {
    key: 'mode', label: '', options: ['Linear', 'Radial', 'Zoom', 'Wave', 'TB', 'LR'], value: 'Linear',
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountSlider(document.getElementById('ctrl-strength'), {
    key: 'strength', label: 'Strength', min: 1, max: 60, step: 1, value: 18,
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountSlider(document.getElementById('ctrl-steps'), {
    key: 'steps', label: 'Quality (samples)', min: 2, max: 30, step: 1, value: 12,
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountSlider(document.getElementById('ctrl-angle'), {
    key: 'angle', label: 'Angle (Linear only)', min: 0, max: 360, step: 1, value: 0,
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountSlider(document.getElementById('ctrl-wavePeriod'), {
    key: 'wavePeriod', label: 'Wave Period (Wave only)', min: 5, max: 80, step: 1, value: 24,
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountChoice(document.getElementById('ctrl-animate'), {
    key: 'animate', label: 'Animate (Wave on stills)', options: ['Off', 'On'], value: 'Off',
    params: tool.params,
    onChange: (v) => {
      if (tool.isVideo) return;
      if (v === 'On') tool.startLoop(); else { tool.stopLoop(); tool.refresh(); }
    },
  });
</script>
