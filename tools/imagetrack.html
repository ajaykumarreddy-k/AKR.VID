<body>

<div class="tool-shell">

    <input type="file" id="fileInput" accept="image/*" hidden />
    <button class="btn primary" id="btnUpload">Upload Image</button>
    <button class="btn" id="btnExportPng">Export PNG</button>

    <div class="section-label">Detection</div>

    <div id="ctrl-maxBlobs"></div>

    <div class="section-label">Display</div>

    <div id="ctrl-shape"></div>
  </aside>

    <div class="drop-hint">Drop an image here, or click Upload</div>
  </main>
</div>

<script src="../js/engine.js"></script>
<script>
  function pseudoRandom(a, b) {
    const x = Math.sin(a * 12.9898 + b * 78.233) * 43758.5453;
    return x - Math.floor(x);
  }

  function detectBlobs(imageData, w, h, threshold) {
    const d = imageData.data;
    const visited = new Uint8Array(w * h);
    const blobs = [];

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const idx = y * w + x;
        if (visited[idx]) continue;
        const pi = idx * 4;
        const brightness = (d[pi] + d[pi + 1] + d[pi + 2]) / 3;
        if (brightness < threshold) { visited[idx] = 1; continue; }

        const stack = [[x, y]];
        visited[idx] = 1;
        let minX = x, maxX = x, minY = y, maxY = y;
        let count = 0, sumX = 0, sumY = 0;

        while (stack.length) {
          const [cx, cy] = stack.pop();
          count++;
          sumX += cx; sumY += cy;
          if (cx < minX) minX = cx;
          if (cx > maxX) maxX = cx;
          if (cy < minY) minY = cy;
          if (cy > maxY) maxY = cy;

          for (let ny = Math.max(0, cy - 1); ny <= Math.min(h - 1, cy + 1); ny++) {
            for (let nx = Math.max(0, cx - 1); nx <= Math.min(w - 1, cx + 1); nx++) {
              if (nx === cx && ny === cy) continue;
              const ni = ny * w + nx;
              if (visited[ni]) continue;
              const npi = ni * 4;
              const nb = (d[npi] + d[npi + 1] + d[npi + 2]) / 3;
              if (nb >= threshold) {
                visited[ni] = 1;
                stack.push([nx, ny]);
              }
            }
          }
        }

        if (count > 2) {
          blobs.push({
            x: minX, y: minY,
            w: maxX - minX + 1, h: maxY - minY + 1,
            cx: Math.round(sumX / count),
            cy: Math.round(sumY / count),
            area: count,
          });
        }
      }
    }

    blobs.sort((a, b) => b.area - a.area);
    return blobs;
  }

  function drawTrackOverlay(ctx, blobs, w, h, style, shape) {
    if (blobs.length === 0) return;

    const scaleX = ctx.canvas.width / w;
    const scaleY = ctx.canvas.height / h;

    // Connector lines between centroids
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1;
    for (let i = 0; i < blobs.length; i++) {
      for (let j = i + 1; j < blobs.length; j++) {
        ctx.beginPath();
        ctx.moveTo(blobs[i].cx * scaleX, blobs[i].cy * scaleY);
        ctx.lineTo(blobs[j].cx * scaleX, blobs[j].cy * scaleY);
        ctx.stroke();
      }
    }

    for (const b of blobs) {
      const bx = b.x * scaleX, by = b.y * scaleY;
      const bw = b.w * scaleX, bh = b.h * scaleY;
      const cx = b.cx * scaleX, cy = b.cy * scaleY;

      ctx.strokeStyle = '#39d97a';
      ctx.lineWidth = 1.5;

      if (style === 'Basic' || style === 'Frame' || style === 'Grid') {
        ctx.strokeRect(bx, by, bw, bh);
      }

      if (style === 'Basic' || style === 'Cross' || style === 'Frame') {
        ctx.beginPath();
        ctx.moveTo(cx - 6, cy); ctx.lineTo(cx + 6, cy);
        ctx.moveTo(cx, cy - 6); ctx.lineTo(cx, cy + 6);
        ctx.stroke();
      }

      if (style === 'Label') {
        ctx.fillStyle = '#39d97a';
        ctx.font = '11px monospace';
        ctx.fillText(`#${blobs.indexOf(b)}`, bx + 2, by - 2);
      }

      if (style === 'Grid') {
        ctx.strokeStyle = 'rgba(57,217,122,0.25)';
        ctx.lineWidth = 0.5;
        const step = 12;
        for (let gx = bx; gx < bx + bw; gx += step) {
          ctx.beginPath(); ctx.moveTo(gx, by); ctx.lineTo(gx, by + bh); ctx.stroke();
        }
        for (let gy = by; gy < by + bh; gy += step) {
          ctx.beginPath(); ctx.moveTo(bx, gy); ctx.lineTo(bx + bw, gy); ctx.stroke();
        }
      }

      // Blob centroid dot
      ctx.fillStyle = '#39d97a';
      ctx.beginPath();
      if (shape === 'rect') {
        ctx.rect(cx - 2, cy - 2, 4, 4);
      } else {
        ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
      }
      ctx.fill();
    }
  }

  function render(ctx, src, w, h, p) {
    ctx.drawImage(src, 0, 0, w, h);

    const scale = Math.min(1, 160 / w);
    const sw = Math.round(w * scale), sh = Math.round(h * scale);
    const tiny = document.createElement('canvas');
    tiny.width = sw; tiny.height = sh;
    const tctx = tiny.getContext('2d');
    tctx.drawImage(src, 0, 0, sw, sh);
    const frame = tctx.getImageData(0, 0, sw, sh);

    const blobs = detectBlobs(frame, sw, sh, p.threshold);
    const top = blobs.slice(0, p.maxBlobs);
    drawTrackOverlay(ctx, top, sw, sh, p.regionStyle, p.shape);
  }

  const tool = new ArtKit.ArtKitTool({ canvasId: 'canvas', onRender: render, params: {} });
  const stage = document.getElementById('stage');
  tool.bindUpload(document.getElementById('fileInput'), stage);

  const wrapLoad = tool.loadFile.bind(tool);
  tool.loadFile = (f) => { wrapLoad(f); stage.classList.add('has-source'); };

  document.getElementById('btnUpload').onclick = () => document.getElementById('fileInput').click();
  document.getElementById('btnExportPng').onclick = () => tool.exportPNG('imagetrack.png');

  ArtKit.mountSlider(document.getElementById('ctrl-threshold'), {
    key: 'threshold', label: 'Brightness Threshold', min: 20, max: 255, step: 1, value: 120,
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountSlider(document.getElementById('ctrl-maxBlobs'), {
    key: 'maxBlobs', label: 'Max Blobs', min: 1, max: 20, step: 1, value: 6,
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountChoice(document.getElementById('ctrl-regionStyle'), {
    key: 'regionStyle', label: '', options: ['Basic', 'Cross', 'Label', 'Frame', 'Grid'],
    value: 'Basic', params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountChoice(document.getElementById('ctrl-shape'), {
    key: 'shape', label: '', options: ['circle', 'rect'], value: 'circle',
    params: tool.params, onChange: () => tool.refresh(),
  });
</script>
