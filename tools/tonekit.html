  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "ToneKit",

    "operatingSystem": "Web",

  }
  </script>
</head>
<body>

<div class="tool-shell">
  <aside class="tool-sidebar">
    <h1 class="tool-logo">TONEKIT</h1>
    <a class="tool-back" href="../index.html">&larr; All tools</a>

    <input type="file" id="fileInput" accept="image/*,video/*" hidden />
    <button class="btn primary" id="btnUpload">Upload Image / Video</button>
    <button class="btn" id="btnCamera">Open Camera</button>
    <button class="btn" id="btnExportPng">Export PNG</button>
    <button class="btn hidden" id="btnExportWebm">Export WebM (5s)</button>

    <div class="section-label">Shape</div>
    <div id="ctrl-shape"></div>

    <div class="section-label">Pattern</div>
    <div id="ctrl-sampleSize"></div>
    <div id="ctrl-scale"></div>
    <div id="ctrl-rotation"></div>

    <div class="section-label">Color</div>
    <div id="ctrl-mode"></div>
    <div id="ctrl-color"></div>
  </aside>

  <main class="tool-stage" id="stage">
    <canvas id="canvas"></canvas>
    <div class="drop-hint">Drop an image or video here, or click Upload</div>
  </main>
</div>

<script src="../js/engine.js"></script>
<script>
  function drawShape(ctx, shape, cx, cy, r) {
    if (r < 0.35) return;
    ctx.beginPath();
    switch (shape) {
      case 'Circle':
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        break;
      case 'Cross':
        ctx.rect(cx - r, cy - r * 0.32, r * 2, r * 0.64);
        ctx.rect(cx - r * 0.32, cy - r, r * 0.64, r * 2);
        break;
      case 'Triangle':
        ctx.moveTo(cx, cy - r);
        ctx.lineTo(cx + r, cy + r);
        ctx.lineTo(cx - r, cy + r);
        ctx.closePath();
        break;
      case 'Line':
        ctx.rect(cx - r, cy - r * 0.18, r * 2, r * 0.36);
        break;
      case 'Spiral': {
        const pStroke = ctx.strokeStyle;
        ctx.strokeStyle = ctx.fillStyle;
        ctx.lineWidth = Math.max(0.5, r * 0.3);
        ctx.lineCap = 'round';
        ctx.moveTo(cx, cy);
        for (let i = 0; i <= 40; i++) {
          const angle = 0.4 * i;
          const rad = (r / 40) * i;
          ctx.lineTo(cx + Math.cos(angle) * rad, cy + Math.sin(angle) * rad);
        }
        ctx.stroke();
        ctx.strokeStyle = pStroke;
        ctx.beginPath();
        break;
      }
      case 'Hexagon':
        for (let i = 0; i < 6; i++) {
          const angle = (i * Math.PI) / 3;
          if (i === 0) ctx.moveTo(cx + r, cy);
          else ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
        }
        ctx.closePath();
        break;
      case 'Ring':
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.arc(cx, cy, r * 0.6, 0, Math.PI * 2, true);
        break;
      case 'Stroke':
        ctx.save(); ctx.translate(cx, cy); ctx.rotate(-Math.PI / 4);
        ctx.rect(-r, -r * 0.15, r * 2, r * 0.3);
        ctx.restore();
        break;
      case 'Polar':
        for (let i = 0; i <= 40; i++) {
          const angle = (i / 40) * Math.PI * 2;
          const rad = r * Math.abs(Math.cos(2 * angle));
          if (i === 0) ctx.moveTo(cx + rad, cy);
          else ctx.lineTo(cx + Math.cos(angle) * rad, cy + Math.sin(angle) * rad);
        }
        ctx.closePath();
        break;
      case 'Capsule':
        ctx.arc(cx - r * 0.5, cy, r * 0.5, Math.PI / 2, Math.PI * 1.5);
        ctx.arc(cx + r * 0.5, cy, r * 0.5, Math.PI * 1.5, Math.PI / 2);
        ctx.closePath();
        break;
      case 'Heart': {
        const hr = r * 1.2;
        ctx.moveTo(cx, cy - hr * 0.2);
        ctx.bezierCurveTo(cx + hr * 0.5, cy - hr * 0.8, cx + hr * 1.1, cy + hr * 0.2, cx, cy + hr * 0.9);
        ctx.bezierCurveTo(cx - hr * 1.1, cy + hr * 0.2, cx - hr * 0.5, cy - hr * 0.8, cx, cy - hr * 0.2);
        break;
      }
      default: // Square
        ctx.rect(cx - r, cy - r, r * 2, r * 2);
    }
    ctx.fill();
  }

  function render(ctx, src, w, h, p) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);

    const data = src.getContext('2d').getImageData(0, 0, w, h).data;
    const cell = p.sampleSize;
    const maxR = (cell / 2) * p.scale;

    ctx.save();
    ctx.translate(w / 2, h / 2);
    ctx.rotate((p.rotation * Math.PI) / 180);
    ctx.translate(-w / 2, -h / 2);

    for (let y = 0; y < h; y += cell) {
      for (let x = 0; x < w; x += cell) {
        const idx = (y * w + x) * 4;
        const r = data[idx], g = data[idx + 1], b = data[idx + 2];
        const brightness = (r + g + b) / 3 / 255;
        const radius = brightness * maxR;
        ctx.fillStyle = p.mode === 'Original Color' ? `rgb(${r},${g},${b})` : p.color;
        drawShape(ctx, p.shape, x + cell / 2, y + cell / 2, radius);
      }
    }
    ctx.restore();
  }

  const tool = new ArtKit.ArtKitTool({ canvasId: 'canvas', onRender: render, params: {} });

  const stage = document.getElementById('stage');
  tool.bindUpload(document.getElementById('fileInput'), stage);

  const wrapLoad = tool.loadFile.bind(tool);
  tool.loadFile = (f) => { wrapLoad(f); stage.classList.add('has-source'); document.getElementById('btnExportWebm').classList.toggle('hidden', !f.type.startsWith('video/')); };

  document.getElementById('btnUpload').onclick = () => document.getElementById('fileInput').click();
  document.getElementById('btnCamera').onclick = () => tool.openCamera().then(() => stage.classList.add('has-source'));
  document.getElementById('btnExportPng').onclick = () => tool.exportPNG('tonekit.png');
  document.getElementById('btnExportWebm').onclick = () => tool.exportWebM('tonekit.webm', 5000);

  ArtKit.mountChoice(document.getElementById('ctrl-shape'), {
    key: 'shape', label: '', options: ['Square', 'Circle', 'Cross', 'Triangle', 'Line', 'Spiral', 'Hexagon', 'Ring', 'Stroke', 'Polar', 'Capsule', 'Heart'],
    value: 'Square', params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountSlider(document.getElementById('ctrl-sampleSize'), {
    key: 'sampleSize', label: 'Sample Size', min: 4, max: 60, step: 1, value: 16,
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountSlider(document.getElementById('ctrl-scale'), {
    key: 'scale', label: 'Scale', min: 0.1, max: 1.5, step: 0.01, value: 0.9,
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountSlider(document.getElementById('ctrl-rotation'), {
    key: 'rotation', label: 'Rotation', min: 0, max: 360, step: 1, value: 0,
    params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountChoice(document.getElementById('ctrl-mode'), {
    key: 'mode', label: '', options: ['Monochrome', 'Original Color'],
    value: 'Monochrome', params: tool.params, onChange: () => tool.refresh(),
  });
  ArtKit.mountColorSwatches(document.getElementById('ctrl-color'), {
    key: 'color', label: '', colors: ['#ffffff', '#000000', '#22d3ee', '#22c55e', '#eab308', '#f97316', '#ef4444'],
    value: '#ffffff', params: tool.params, onChange: () => tool.refresh(),
  });
</script>
